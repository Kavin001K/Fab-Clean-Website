openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Fab Clean API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Service catalog
  - name: pricing
    description: Pricing information
  - name: pickups
    description: Pickup scheduling
  - name: contact
    description: Contact form
  - name: auth
    description: Authentication
  - name: orders
    description: Authenticated customer portal orders
  - name: tracking
    description: Public ERP-backed order tracking
  - name: feedback
    description: Public ERP-backed order feedback
  - name: reviews
    description: Curated public reviews
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesResponse"

  /services/{slug}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceDetailResponse"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pricing:
    get:
      operationId: listPricing
      tags: [pricing]
      summary: Get all pricing tables
      responses:
        "200":
          description: Pricing tables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingResponse"

  /pickups:
    post:
      operationId: schedulePickup
      tags: [pickups]
      summary: Schedule a pickup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulePickupRequest"
      responses:
        "201":
          description: Pickup scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulePickupResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "200":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and invalidate token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List portal user orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get portal order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /track/{orderNumber}:
    get:
      operationId: getPublicTrackOrder
      tags: [tracking]
      summary: Track an ERP order by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ERP-backed order tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicTrackOrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback/context:
    get:
      operationId: getFeedbackContext
      tags: [feedback]
      summary: Load feedback context for an ERP order
      parameters:
        - name: orderId
          in: query
          required: false
          schema:
            type: string
        - name: orderNumber
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Feedback context loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackContextResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit or update ERP-backed order feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackRequest"
      responses:
        "200":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitFeedbackResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/top:
    get:
      operationId: listTopReviews
      tags: [reviews]
      summary: List homepage top reviews
      responses:
        "200":
          description: Curated top reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopReviewsResponse"

  /reviews/best:
    get:
      operationId: listBestReviews
      tags: [reviews]
      summary: List paginated best reviews
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: Paginated best reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BestReviewsResponse"

  /users/profile:
    get:
      operationId: getProfile
      tags: [auth]
      summary: Get user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [success, error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Service:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        icon:
          type: string
        category:
          type: string
        startingPrice:
          type: number
        features:
          type: array
          items:
            type: string
      required:
        - id
        - slug
        - name
        - description
        - shortDescription
        - icon
        - category
        - startingPrice
        - features

    ServicesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Service"
      required: [success, data]

    ServiceDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Service"
      required: [success, data]

    PricingItem:
      type: object
      properties:
        item:
          type: string
        type:
          type: string
        price:
          type: number
        unit:
          type: string
      required: [item, price]

    PricingCategory:
      type: object
      properties:
        category:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PricingItem"
      required: [category, items]

    PricingResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PricingCategory"
      required: [success, data]

    SchedulePickupRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        addressLat:
          type: number
        addressLng:
          type: number
        services:
          type: array
          items:
            type: string
        specialInstructions:
          type: string
        preferredDate:
          type: string
          format: date
        timeSlot:
          type: string
          enum: [morning, afternoon, evening]
        branch:
          type: string
          enum: [pollachi, kinathukadavu]
      required:
        - name
        - phone
        - address
        - services
        - preferredDate
        - timeSlot
        - branch

    SchedulePickupResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            bookingReference:
              type: string
            message:
              type: string
          required: [bookingReference, message]
      required: [success, data]

    ContactRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        subject:
          type: string
        message:
          type: string
      required: [name, email, message]

    SendOtpRequest:
      type: object
      properties:
        phone:
          type: string
      required: [phone]

    SendOtpResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              type: string
            expiresIn:
              type: number
          required: [message, expiresIn]
      required: [success, data]

    VerifyOtpRequest:
      type: object
      properties:
        phone:
          type: string
        otp:
          type: string
      required: [phone, otp]

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            isNewUser:
              type: boolean
            user:
              $ref: "#/components/schemas/UserProfile"
          required: [accessToken, isNewUser, user]
      required: [success, data]

    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
          required: [accessToken]
      required: [success, data]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true
      required: [id, phone]

    ProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/UserProfile"
      required: [success, data]

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email

    PortalOrderItem:
      type: object
      properties:
        serviceName:
          type: string
        quantity:
          type: integer
        price:
          type: number
      required: [serviceName, quantity, price]

    TrackingStep:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        completed:
          type: boolean
        current:
          type: boolean
      required: [key, label, completed, current]

    PortalOrder:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        reference:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - ready_for_pickup
            - out_for_delivery
            - completed
            - delivered
            - in_store
            - ready
            - cancelled
        paymentStatus:
          type: string
        totalAmount:
          type: number
          nullable: true
        services:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PortalOrderItem"
        branch:
          type: string
        fulfillmentType:
          type: string
          enum: [pickup, delivery]
        scheduledDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        pickupDate:
          type: string
          format: date-time
          nullable: true
        invoiceUrl:
          type: string
          nullable: true
        lastWhatsappStatus:
          type: string
          nullable: true
        lastWhatsappSentAt:
          type: string
          format: date-time
          nullable: true
        customerName:
          type: string
          nullable: true
        customerPhone:
          type: string
          nullable: true
        customerEmail:
          type: string
          nullable: true
        customerRating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        feedbackComment:
          type: string
          nullable: true
        feedbackSubmittedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - orderNumber
        - reference
        - status
        - paymentStatus
        - services
        - items
        - branch
        - fulfillmentType
        - createdAt

    OrdersResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PortalOrder"
      required: [success, data]

    OrderDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PortalOrder"
      required: [success, data]

    PublicTrackOrder:
      allOf:
        - $ref: "#/components/schemas/PortalOrder"
        - type: object
          properties:
            steps:
              type: array
              items:
                $ref: "#/components/schemas/TrackingStep"
          required: [steps]

    PublicTrackOrderResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PublicTrackOrder"
      required: [success, data]

    ExistingFeedback:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        comment:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
      required: [rating, comment, submittedAt]

    FeedbackContext:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        customerName:
          type: string
          nullable: true
        status:
          type: string
        fulfillmentType:
          type: string
          enum: [pickup, delivery]
        totalAmount:
          type: number
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PortalOrderItem"
        existingFeedback:
          $ref: "#/components/schemas/ExistingFeedback"
      required:
        - id
        - orderNumber
        - status
        - fulfillmentType
        - items
        - existingFeedback

    FeedbackContextResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/FeedbackContext"
      required: [success, data]

    SubmitFeedbackRequest:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
      required: [rating]

    FeedbackSubmission:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: string
        rating:
          type: integer
        comment:
          type: string
          nullable: true
        feedbackSubmittedAt:
          type: string
          format: date-time
        googleReviewEligible:
          type: boolean
      required:
        - orderId
        - orderNumber
        - rating
        - feedbackSubmittedAt
        - googleReviewEligible

    SubmitFeedbackResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/FeedbackSubmission"
      required: [success, data]

    PublicReview:
      type: object
      properties:
        id:
          type: string
        rating:
          type: integer
        comment:
          type: string
          nullable: true
        isTopRating:
          type: boolean
        isBestRating:
          type: boolean
        curationScore:
          type: number
          nullable: true
        curationReason:
          type: string
          nullable: true
        aiProvider:
          type: string
          nullable: true
        aiModel:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        customerName:
          type: string
        location:
          type: string
        orderNumber:
          type: string
          nullable: true
      required:
        - id
        - rating
        - isTopRating
        - isBestRating
        - createdAt
        - customerName
        - location

    TopReviewsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PublicReview"
      required: [success, data]

    BestReviewsMeta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        hasMore:
          type: boolean
      required: [page, pageSize, hasMore]

    BestReviewsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PublicReview"
        meta:
          $ref: "#/components/schemas/BestReviewsMeta"
      required: [success, data, meta]
