openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Fab Clean API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Service catalog
  - name: pricing
    description: Pricing information
  - name: pickups
    description: Pickup scheduling
  - name: contact
    description: Contact form
  - name: auth
    description: Authentication
  - name: orders
    description: Order management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesResponse"

  /services/{slug}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceDetailResponse"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pricing:
    get:
      operationId: listPricing
      tags: [pricing]
      summary: Get all pricing tables
      responses:
        "200":
          description: Pricing tables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingResponse"

  /pickups:
    post:
      operationId: schedulePickup
      tags: [pickups]
      summary: Schedule a pickup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulePickupRequest"
      responses:
        "201":
          description: Pickup scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulePickupResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "200":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendOtpResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and invalidate token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List user orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/track:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track order by phone and reference
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
        - name: ref
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTrackResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      operationId: getProfile
      tags: [orders]
      summary: Get user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
    patch:
      operationId: updateProfile
      tags: [orders]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - success
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    Service:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        icon:
          type: string
        category:
          type: string
        startingPrice:
          type: number
        features:
          type: array
          items:
            type: string
      required:
        - id
        - slug
        - name
        - description
        - shortDescription
        - icon
        - category
        - startingPrice
        - features

    ServicesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Service"
      required:
        - success
        - data

    ServiceDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Service"
      required:
        - success
        - data

    PricingItem:
      type: object
      properties:
        item:
          type: string
        type:
          type: string
        price:
          type: number
        unit:
          type: string
      required:
        - item
        - price

    PricingCategory:
      type: object
      properties:
        category:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PricingItem"
      required:
        - category
        - items

    PricingResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PricingCategory"
      required:
        - success
        - data

    SchedulePickupRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        addressLat:
          type: number
        addressLng:
          type: number
        services:
          type: array
          items:
            type: string
        specialInstructions:
          type: string
        preferredDate:
          type: string
          format: date
        timeSlot:
          type: string
          enum: [morning, afternoon, evening]
        branch:
          type: string
          enum: [pollachi, kinathukadavu]
      required:
        - name
        - phone
        - address
        - services
        - preferredDate
        - timeSlot
        - branch

    SchedulePickupResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            bookingReference:
              type: string
            message:
              type: string
          required:
            - bookingReference
            - message
      required:
        - success
        - data

    ContactRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        subject:
          type: string
        message:
          type: string
      required:
        - name
        - email
        - message

    SendOtpRequest:
      type: object
      properties:
        phone:
          type: string
      required:
        - phone

    SendOtpResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              type: string
            expiresIn:
              type: number
          required:
            - message
            - expiresIn
      required:
        - success
        - data

    VerifyOtpRequest:
      type: object
      properties:
        phone:
          type: string
        otp:
          type: string
      required:
        - phone
        - otp

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            isNewUser:
              type: boolean
            user:
              $ref: "#/components/schemas/UserProfile"
          required:
            - accessToken
            - isNewUser
      required:
        - success
        - data

    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
          required:
            - accessToken
      required:
        - success
        - data

    UserProfile:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - phone

    ProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/UserProfile"
      required:
        - success
        - data

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email

    Order:
      type: object
      properties:
        id:
          type: string
        reference:
          type: string
        status:
          type: string
          enum: [received, sorting, cleaning, quality_check, ready, out_for_delivery, delivered]
        services:
          type: array
          items:
            type: string
        branch:
          type: string
        scheduledDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        totalAmount:
          type: number
      required:
        - id
        - reference
        - status
        - services
        - branch
        - createdAt

    OrdersResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - success
        - data

    OrderDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Order"
      required:
        - success
        - data

    OrderTrackResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            reference:
              type: string
            status:
              type: string
            stages:
              type: array
              items:
                type: object
                properties:
                  stage:
                    type: string
                  label:
                    type: string
                  completed:
                    type: boolean
                  timestamp:
                    type: string
                    format: date-time
                required:
                  - stage
                  - label
                  - completed
          required:
            - reference
            - status
            - stages
      required:
        - success
        - data
